<!DOCTYPE html>
<html>
<head>

<title>Live Cricket Score</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#0b1d36;
color:white;
}

h1{
background:#142850;
padding:15px;
}

.box{
background:#1b2a49;
padding:20px;
margin:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>🏏 Live Cricket Score</h1>

<div class="box">

<h2 id="match">Loading match...</h2>

<p id="score"></p>

<p id="status"></p>

</div>

<script>

fetch("https://api.cricapi.com/v1/currentMatches?apikey=b987e6fd-cd52-422e&offset=0")

.then(response => response.json())

.then(data => {

let match = data.data[0];

document.getElementById("match").innerHTML =
match.name;

document.getElementById("score").innerHTML =
JSON.stringify(match.score);

document.getElementById("status").innerHTML =
match.status;

});

setInterval(function(){

location.reload();

},30000);

</script>

</body>
</html>
