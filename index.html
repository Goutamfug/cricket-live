<!DOCTYPE html>
<html>
<head>
<title>Live Cricket Score</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#0b1d36;
color:white;
}

h1{
background:#142850;
padding:15px;
}

.box{
background:#1b2a49;
padding:20px;
margin:20px;
border-radius:10px;
}
</style>

</head>

<body>

<h1>🏏 Live Cricket Score</h1>

<div class="box">
<h2 id="match">Loading match...</h2>
<p id="score"></p>
<p id="status"></p>
</div>

<script>

fetch("https://api.cricapi.com/v1/currentMatches?apikey=b987e6fd-cd52-422e&offset=0")
.then(res => res.json())
.then(data => {

if(data.data && data.data.length>0){

let match = data.data[0];

document.getElementById("match").innerHTML = match.name;

if(match.score){
document.getElementById("score").innerHTML =
match.score[0].r + "/" + match.score[0].w + " (" + match.score[0].o + " overs)";
}

document.getElementById("status").innerHTML = match.status;

}else{

document.getElementById("match").innerHTML = "No Live Match";

}

})

.catch(error => {
document.getElementById("match").innerHTML="API Error";
console.log(error);
});

</script>

</body>
</html>
